<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Bài tập Tailwind CSS</title>
</head>

<body class="bg-gray-100">

    <nav class="flex justify-between items-center bg-blue-600 p-4 text-white">
        <div class="font-bold">MySite</div>

        <div class="md:hidden">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7" />
            </svg>
        </div>

        <ul class="hidden md:flex space-x-6 text-sm">
            <li class="hover:text-gray-200 cursor-pointer">Home</li>
            <li class="hover:text-gray-200 cursor-pointer">About</li>
            <li class="hover:text-gray-200 cursor-pointer">Contact</li>
        </ul>
    </nav>

    <div class="flex flex-col md:flex-row items-center justify-center min-h-[80vh] p-8 gap-8">

        <div class="w-48 md:w-64">
            <img src="https://upload.wikimedia.org/wikipedia/commons/d/d5/Tailwind_CSS_Logo.svg" alt="Tailwind Logo">

        </div>
        <h1 class="text-3xl md:text-5xl font-bold">Tailwind CSS</h1>
        <div class="text-center md:text-left">
            <h2 class="text-3xl md:text-5xl font-bold text-gray-800">Learn Tailwind CSS</h2>
            <p class="text-gray-600 mt-2">Build responsive layouts quickly with utility-first CSS.</p>

            <button
                class="mt-6 bg-blue-600 text-white px-6 py-2 rounded shadow-md hover:bg-blue-700 transition duration-300">
                Get Started
            </button>
        </div>

    </div>

</body>

</html>
